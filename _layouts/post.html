---
layout: default
---
<article style="max-width: 780px; margin: 0 auto; padding: 80px 40px;">

  <header style="margin-bottom: 56px; border-bottom: 1px solid #e6dfd8; padding-bottom: 40px;">
    <a href="/blog/" style="font-family: 'Raleway', sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: #8897a9; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 32px;">← Back to Blog</a>

    {% if page.category %}
    <span style="font-family: 'Raleway', sans-serif; font-size: 9px; font-weight: 500; letter-spacing: 0.26em; text-transform: uppercase; color: #8897a9; display: block; margin-bottom: 16px;">{{ page.category }}</span>
    {% endif %}

    <h1 style="font-family: 'Raleway', sans-serif; font-weight: 200; font-size: clamp(28px, 4vw, 48px); color: #2c3540; letter-spacing: 0.04em; line-height: 1.2; margin-bottom: 20px;">{{ page.title }}</h1>

    <time style="font-family: 'Raleway', sans-serif; font-size: 11px; letter-spacing: 0.16em; color: #8897a9; text-transform: uppercase;">{{ page.date | date: "%B %d, %Y" }}</time>

    {% if page.thumbnail %}
    <img src="{{ page.thumbnail }}" alt="{{ page.title }}" style="width: 100%; height: 400px; object-fit: cover; margin-top: 40px; display: block;" loading="lazy" />
    {% endif %}
  </header>

  <div style="font-size: 17px; line-height: 2.0; color: #3a4a5a;">
    {{ content }}
  </div>

  <footer style="margin-top: 64px; padding-top: 40px; border-top: 1px solid #e6dfd8; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
    <a href="/blog/" style="font-family: 'Raleway', sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: #8897a9; text-decoration: none;">← Back to Blog</a>
    <a href="/contact/" style="background: #8897a9; color: white; font-family: 'Raleway', sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; text-decoration: none; padding: 14px 32px;">Book a Free Consultation</a>
  </footer>

</article>
